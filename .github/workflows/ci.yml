name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Compile-verify every platform's accessibility backend (Linux AT-SPI2,
  # Windows UIA, macOS AX) and lint. Live/runtime tests are gated behind the
  # `live-tests` feature and are not run in CI (they need a real desktop).
  build:
    name: build + clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # The PyO3 binding (slug-ui-py) is platform-neutral and built+tested on the
      # ubuntu `test` job; exclude it from the cross-OS matrix to avoid per-OS
      # Python toolchain setup (the matrix exists to compile-verify the
      # accessibility backends).
      - name: Build (release)
        run: cargo build --workspace --exclude slug-ui-py --release

      - name: Clippy (all targets)
        run: cargo clippy --workspace --exclude slug-ui-py --all-targets --release

  # Linux is the only target whose non-live tests can run headlessly in CI.
  test:
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
      - name: Test (workspace, no live-tests)
        run: cargo test --workspace
