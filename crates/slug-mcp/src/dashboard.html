<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Slug</title>
<style>
  :root{
    --bg:#08080b; --bg2:#0d0d12; --panel:#131319; --panel2:#0f0f15; --line:#23232d;
    --line2:#2e2e3a; --fg:#e7e7ee; --muted:#9a9aab; --dim:#6b6b7b;
    --accent:#7c9cff; --accent2:#a78bfa; --ok:#34d399; --warn:#fbbf24; --bad:#f87171;
    --chip:#1a1a22;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:radial-gradient(1200px 600px at 80% -10%, #15151f 0%, var(--bg) 60%);
    color:var(--fg); font:13.5px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Cascadia Code",monospace}
  /* ---- approvals banner ---- */
  .approvals{background:linear-gradient(90deg,#2a0f12,#1a0c10); border-bottom:1px solid var(--bad);
    padding:10px 16px; display:flex; flex-direction:column; gap:8px; flex:0 0 auto}
  .approvals .hdr{color:#ff9b93; font-weight:700; font-size:11px; letter-spacing:.06em; text-transform:uppercase}
  .approvals .ap{display:flex; align-items:center; gap:10px; font-size:13px}
  .approvals .ap .txt{flex:1; color:#ffd9d5; word-break:break-word}
  .approvals .ap .age{color:var(--dim); font-size:11px}
  /* ---- top bar ---- */
  header.topbar{flex:0 0 auto; display:flex; align-items:center; gap:14px; padding:11px 16px;
    background:linear-gradient(180deg,#101018,#0c0c12); border-bottom:1px solid var(--line)}
  .brand{display:flex; align-items:center; gap:9px; font-weight:700; letter-spacing:.2px}
  .brand .logo{font-size:18px}
  .brand .ver{color:var(--dim); font-weight:500; font-size:11px}
  .pills{display:flex; align-items:center; gap:8px; margin-left:6px; flex-wrap:wrap}
  .pill{display:inline-flex; align-items:center; gap:7px; background:var(--chip);
    border:1px solid var(--line2); border-radius:999px; padding:4px 11px; font-size:12px; color:var(--fg)}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);box-shadow:0 0 0 0 rgba(0,0,0,0)}
  .dot.ok{background:var(--ok);box-shadow:0 0 8px 0 var(--ok)} .dot.bad{background:var(--bad)}
  .dot.warn{background:var(--warn)} .pill b{font-weight:600}
  .pill .k{color:var(--muted)}
  .spacer{flex:1}
  /* ---- layout ---- */
  main.grid{flex:1; display:grid; grid-template-columns:320px 1fr 360px; gap:12px; padding:12px; min-height:0}
  .col{background:var(--panel); border:1px solid var(--line); border-radius:12px; display:flex;
    flex-direction:column; min-height:0; overflow:hidden}
  .col > h2{margin:0; font-size:12px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted);
    padding:11px 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px}
  .body{padding:12px 14px; overflow:auto; min-height:0}
  .body.tight{padding:10px}
  /* ---- agent column ---- */
  .card{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:12px}
  .brainline{display:flex; align-items:center; gap:10px}
  .brainbadge{font-size:22px}
  .brainmeta{line-height:1.25}
  .brainmeta .name{font-weight:700} .brainmeta .sub{color:var(--muted); font-size:12px}
  .metrics{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0}
  .tile{background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:9px 11px}
  .tile .k{color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.04em}
  .tile .v{font-size:18px; font-weight:700; margin-top:2px}
  .tile.wide{grid-column:1/-1}
  textarea{width:100%; min-height:74px; resize:vertical; padding:10px; background:var(--bg2);
    color:var(--fg); border:1px solid var(--line2); border-radius:9px; font:inherit; outline:none}
  textarea:focus,input:focus,select:focus{border-color:var(--accent)}
  .btns{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px}
  button{font:inherit; cursor:pointer; border-radius:9px; border:1px solid var(--line2);
    background:var(--chip); color:var(--fg); padding:9px 12px; transition:.12s}
  button:hover{border-color:var(--accent); background:#1d1d27}
  button.primary{background:linear-gradient(180deg,#3b5bdb,#2f49b8); border-color:#4661e0; color:#fff; font-weight:600}
  button.primary:hover{filter:brightness(1.08)}
  button.ghost{background:transparent}
  button.span{grid-column:1/-1}
  .statuspill{margin-left:auto; font-size:11px; padding:3px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:.05em}
  .s-idle{background:#1a1a22;color:var(--muted)} .s-running{background:#0e2a1c;color:var(--ok)}
  .s-paused{background:#2a230e;color:var(--warn)} .s-done{background:#102338;color:var(--accent)}
  .s-stopped,.s-error{background:#2a0f12;color:var(--bad)}
  /* ---- tree ---- */
  .toolbar{display:flex; gap:8px; align-items:center; padding:9px 12px; border-bottom:1px solid var(--line)}
  input.f,select{background:var(--bg2); color:var(--fg); border:1px solid var(--line2); border-radius:7px;
    font:inherit; padding:5px 9px; outline:none}
  input.f{flex:1}
  .tree{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; white-space:pre; line-height:1.55}
  .tree .role{color:var(--accent2)} .tree .nm{color:var(--fg)} .tree .ref{color:var(--ok)}
  .tree .st{color:var(--warn)} .tree .xy{color:var(--accent)} .tree .cmt{color:var(--dim)}
  .empty{color:var(--dim); font-style:italic; padding:8px}
  .kv{color:var(--dim); font-size:11px; margin-left:auto}
  /* ---- tabs (side col) ---- */
  .tabs{display:flex; gap:4px; padding:8px 10px; border-bottom:1px solid var(--line)}
  .tab{padding:5px 11px; border-radius:8px; font-size:12px; color:var(--muted); border:1px solid transparent; cursor:pointer}
  .tab.active{background:var(--chip); color:var(--fg); border-color:var(--line2)}
  .tab .badge{display:inline-block; min-width:16px; text-align:center; margin-left:6px; padding:0 5px;
    border-radius:999px; background:#23232d; color:var(--muted); font-size:10px}
  .pane{display:none; flex:1; min-height:0} .pane.active{display:flex; flex-direction:column}
  /* ---- log ---- */
  .log{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; line-height:1.5}
  .log .line{padding:2px 0; border-bottom:1px solid #17171f; word-break:break-word}
  .log .err{color:var(--bad)}
  /* ---- mcp ---- */
  .mcp-item{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #17171f}
  .mcp-item .nm{font-weight:600}
  .mcp-item .url{color:var(--dim); font-size:11px} .mcp-item.mono .url{font-family:ui-monospace,monospace}
  .mcp-item .x{margin-left:auto; color:var(--dim); border:none; background:none; padding:4px 8px}
  .mcp-item .x:hover{color:var(--bad)}
  .stat{font-size:11px; padding:2px 8px; border-radius:999px}
  .stat.self{background:#102338;color:var(--accent)} .stat.reachable{background:#0e2a1c;color:var(--ok)}
  .stat.unreachable{background:#2a0f12;color:var(--bad)} .stat.command{background:#23232d;color:var(--muted)}
  .addform{display:grid; grid-template-columns:1fr; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line)}
  .addform .row{display:flex; gap:8px} .addform input{flex:1}
  /* ---- apps ---- */
  .app-item{padding:7px 0; border-bottom:1px solid #17171f; display:flex; gap:8px; align-items:center}
  .app-item .nm{font-weight:600} .app-item .bus{color:var(--dim); font-size:11px; margin-left:auto}
  .note{color:var(--dim); font-size:11px; padding:8px 14px; border-top:1px solid var(--line)}
  ::-webkit-scrollbar{width:10px;height:10px} ::-webkit-scrollbar-thumb{background:#23232d;border-radius:8px}
</style>
</head>
<body>

<div id="approvals" class="approvals" hidden></div>

<header class="topbar">
  <div class="brand"><span class="logo">🐌</span> Slug <span class="ver" id="ver"></span>
    <span class="ver" style="margin-left:8px">· by Thibault Dufour</span></div>
  <div class="pills">
    <span class="pill" id="brainPill"><span class="dot" id="brainDot"></span><span class="k">brain</span> <b id="brainName">…</b></span>
    <span class="pill" id="clientPill"><span class="dot" id="clientDot"></span><b id="clientTxt">no client</b></span>
    <span class="pill" id="mcpPill"><span class="dot" id="mcpDot"></span><span class="k">MCP</span> <b id="mcpCount">0</b></span>
  </div>
  <div class="spacer"></div>
  <span class="pill"><span class="dot" id="busDot"></span><b id="busTxt">perception</b></span>
</header>

<main class="grid">
  <!-- LEFT: agent control -->
  <section class="col">
    <h2>Agent <span class="statuspill s-idle" id="statusPill">idle</span></h2>
    <div class="body">
      <div class="card">
        <div class="brainline">
          <span class="brainbadge" id="brainEmoji">🧠</span>
          <div class="brainmeta"><div class="name" id="brainName2">—</div><div class="sub" id="brainSub">—</div></div>
        </div>
      </div>
      <div class="metrics">
        <div class="tile"><div class="k">steps</div><div class="v" id="mSteps">0</div></div>
        <div class="tile"><div class="k">elapsed</div><div class="v" id="mElapsed">–</div></div>
        <div class="tile"><div class="k">tokens</div><div class="v" id="mTokens">0</div></div>
        <div class="tile"><div class="k">cost</div><div class="v" id="mCost">$0.00</div></div>
        <div class="tile wide"><div class="k">task</div><div class="v" id="mTask" style="font-size:13px;font-weight:500;word-break:break-word">—</div></div>
      </div>
      <textarea id="taskInput" placeholder="Tell Slug what to do, e.g. 'Open Safari on chess.com and play 1.e4'…"></textarea>
      <div class="btns">
        <button class="primary span" onclick="startTask()">▶ Start task</button>
        <button class="ghost" onclick="ctl('slug_agent_pause')">⏸ Pause</button>
        <button class="ghost" onclick="ctl('slug_agent_resume')">▶ Resume</button>
        <button class="ghost span" onclick="ctl('slug_agent_stop')">■ Stop</button>
      </div>
    </div>
  </section>

  <!-- CENTER: semantic tree -->
  <section class="col">
    <h2>Semantic view <span class="kv" id="treeAge"></span></h2>
    <div class="toolbar">
      <input id="filter" class="f" placeholder="filter the tree…" oninput="renderTree()" />
      <select id="scope" onchange="refreshTree(true)">
        <option value="focused" selected>focused</option>
        <option value="window">window</option>
        <option value="desktop">desktop</option>
      </select>
    </div>
    <div class="body" style="flex:1"><div id="tree" class="tree"><span class="empty">loading…</span></div><div id="opaque"></div></div>
    <div class="note">Slug never captures pixels — this is the same structured text the agent reads.</div>
  </section>

  <!-- RIGHT: tabs -->
  <section class="col">
    <div class="tabs">
      <div class="tab active" data-tab="log" onclick="showTab('log')">Activity</div>
      <div class="tab" data-tab="mcp" onclick="showTab('mcp')">MCP <span class="badge" id="mcpBadge">0</span></div>
      <div class="tab" data-tab="apps" onclick="showTab('apps')">Apps <span class="badge" id="appsBadge">0</span></div>
    </div>
    <div class="pane active" id="pane-log"><div class="body log" id="log"><span class="empty">no activity yet</span></div></div>
    <div class="pane" id="pane-mcp">
      <div class="body">
        <div id="mcpList"><span class="empty">…</span></div>
        <div class="addform">
          <div style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em">Add a custom MCP server</div>
          <input id="mcpName" class="f" placeholder="name (e.g. github)" />
          <div class="row">
            <input id="mcpUrl" class="f" placeholder="http://127.0.0.1:9000/mcp" />
            <button class="primary" onclick="addMcp()">Add</button>
          </div>
          <div id="mcpMsg" style="color:var(--bad);font-size:11px;min-height:14px"></div>
        </div>
      </div>
    </div>
    <div class="pane" id="pane-apps"><div class="body" id="apps"><span class="empty">—</span></div></div>
  </section>
</main>

<script>
let rpcId=0, mcpOk=false, busOk=false, lastStatus='idle', treeText='', treeAt=0, appsAt=0;
const TREE_TTL=1500;

async function callTool(name, args={}){
  const r = await fetch('/mcp',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',id:++rpcId,method:'tools/call',params:{name,arguments:args}})});
  const j = await r.json();
  mcpOk=true;
  if(j.error) throw new Error(j.error.message||'tool error');
  const c=j.result&&j.result.content&&j.result.content[0];
  return {text:(c&&c.text)||'', isError:!!(j.result&&j.result.isError)};
}
async function jget(p){ const r=await fetch(p); if(!r.ok) throw new Error(r.status); return r.json(); }
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtNum(n){return n>=1000?(n/1000).toFixed(n>=10000?0:1)+'k':String(n);}
function fmtDur(s){if(!s)return '–';const m=Math.floor(s/60),x=s%60;return m?`${m}m ${x}s`:`${x}s`;}
function setDot(id,cls){const e=document.getElementById(id);e.className='dot'+(cls?' '+cls:'');}

// ---------- header info: brain (Claude/local) + client + version ----------
async function refreshInfo(){
  try{
    const i=await jget('/info');
    document.getElementById('ver').textContent='v'+(i.version||'');
    const b=i.brain||{};
    const local=b.location==='local';
    const label = local ? ('Local · '+(b.provider||'?')) :
      (b.provider==='claude'?'Claude':(b.provider||'cloud'));
    document.getElementById('brainName').textContent=label;
    setDot('brainDot', b.provider?'ok':'warn');
    document.getElementById('brainEmoji').textContent= local?'💻':'☁️';
    document.getElementById('brainName2').textContent=label;
    document.getElementById('brainSub').textContent=(b.model||'')+(local?' (on this machine)':' (cloud API)');
    const c=i.client||{};
    document.getElementById('clientTxt').textContent=c.connected?'MCP client connected':'no client';
    setDot('clientDot', c.connected?'ok':'');
  }catch(e){}
}

// ---------- agent status ----------
let statusBusy=false;
async function refreshStatus(){
  if(statusBusy)return; statusBusy=true;
  try{
    const {text}=await callTool('slug_agent_status');
    const s=JSON.parse(text); lastStatus=s.status||'idle';
    const pill=document.getElementById('statusPill');
    pill.textContent=s.status||'idle'; pill.className='statuspill s-'+(s.status||'idle');
    document.getElementById('mSteps').textContent=s.steps??0;
    document.getElementById('mTokens').textContent=fmtNum(s.tokens||0);
    document.getElementById('mCost').textContent='$'+(s.cost_usd||0).toFixed(4);
    document.getElementById('mElapsed').textContent=s.elapsed_s?fmtDur(s.elapsed_s):'–';
    document.getElementById('mTask').textContent=s.task||'—';
    // live brain overrides config when a task is running
    if(s.provider){
      const local=(s.provider==='ollama');
      const label=local?('Local · '+s.provider):(s.provider==='claude'?'Claude':s.provider);
      document.getElementById('brainName').textContent=label;
      document.getElementById('brainName2').textContent=label;
      document.getElementById('brainSub').textContent=(s.model||'')+(s.tier?(' · '+s.tier):'');
    }
    const log=document.getElementById('log');
    if(s.log&&s.log.length){
      log.innerHTML=s.log.map(l=>`<div class="line${/\[ERROR\]|error/i.test(l)?' err':''}">${esc(l)}</div>`).join('');
    }
    setDot('busDot','ok'); document.getElementById('busTxt').textContent='perception';
  }catch(e){ setDot('busDot','bad'); document.getElementById('busTxt').textContent='offline'; }
  finally{ statusBusy=false; }
}

// ---------- semantic tree ----------
async function refreshTree(force){
  if(!force && Date.now()-treeAt<TREE_TTL) return;
  const scope=document.getElementById('scope').value;
  try{
    const {text}=await callTool('slug_snapshot',{scope});
    treeText=text; treeAt=Date.now(); renderTree();
  }catch(e){ document.getElementById('tree').innerHTML='<span class="empty">'+esc(e.message)+'</span>'; }
}
function renderTree(){
  const q=(document.getElementById('filter').value||'').toLowerCase();
  const lines=treeText.split('\n').filter(l=>l.length);
  const out=[];
  for(const ln of lines){
    if(q && !ln.toLowerCase().includes(q)) continue;
    if(ln.trim().startsWith('#')){ out.push('<span class="cmt">'+esc(ln)+'</span>'); continue; }
    let h=esc(ln)
      .replace(/^(\s*-\s)([a-z_]+)/,'$1<span class="role">$2</span>')
      .replace(/(&quot;[^&]*&quot;)/,'<span class="nm">$1</span>')
      .replace(/(\[ref=[^\]]+\])/,'<span class="ref">$1</span>')
      .replace(/(\[(?:focused|checked|selected|expanded|disabled|readonly|required|invalid)\])/g,'<span class="st">$1</span>')
      .replace(/(@-?\d+,-?\d+)/,'<span class="xy">$1</span>');
    out.push(h);
  }
  document.getElementById('tree').innerHTML=out.length?out.join('\n'):'<span class="empty">no matching nodes</span>';
  document.getElementById('treeAge').textContent=treeAt?('· '+Math.round((Date.now()-treeAt)/1000)+'s ago'):'';
}

// ---------- running apps ----------
async function refreshApps(){
  try{
    const {text}=await callTool('slug_list_apps');
    const lines=text.split('\n').filter(l=>l.trim().startsWith('- '));
    document.getElementById('appsBadge').textContent=lines.length;
    document.getElementById('apps').innerHTML= lines.length? lines.map(l=>{
      const m=l.match(/^-\s+(.*?)\s*(\[(.*)\])?$/);
      const nm=m?m[1]:l, bus=m&&m[3]?m[3]:'';
      return `<div class="app-item"><span class="nm">${esc(nm)}</span><span class="bus mono">${esc(bus)}</span></div>`;
    }).join('') : '<span class="empty">no accessible apps</span>';
  }catch(e){ document.getElementById('apps').innerHTML='<span class="empty">'+esc(e.message)+'</span>'; }
}

// ---------- MCP servers ----------
async function refreshMcp(){
  try{
    const j=await jget('/mcp-servers'); const servers=j.servers||[];
    const custom=servers.filter(s=>s.kind!=='self').length;
    const reachable=servers.filter(s=>s.status==='reachable'||s.status==='serving').length;
    document.getElementById('mcpCount').textContent=reachable;
    document.getElementById('mcpBadge').textContent=servers.length;
    setDot('mcpDot', reachable>0?'ok':'warn');
    document.getElementById('mcpList').innerHTML=servers.map(s=>{
      const cls=s.status||'command';
      const label={serving:'serving',reachable:'connected',unreachable:'unreachable',command:'command'}[cls]||cls;
      const rm=s.kind==='self'?'':`<button class="x" title="remove" onclick="removeMcp('${esc(s.name)}')">✕</button>`;
      return `<div class="mcp-item mono"><div><div class="nm">${esc(s.name)}</div><div class="url">${esc(s.url)}</div></div>
        <span class="stat ${cls}">${label}</span>${rm}</div>`;
    }).join('')||'<span class="empty">none</span>';
  }catch(e){ document.getElementById('mcpList').innerHTML='<span class="empty">'+esc(e.message)+'</span>'; }
}
async function addMcp(){
  const name=document.getElementById('mcpName').value.trim();
  const url=document.getElementById('mcpUrl').value.trim();
  const msg=document.getElementById('mcpMsg'); msg.textContent='';
  try{
    const r=await fetch('/mcp-servers',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({name,url})});
    if(!r.ok){ const j=await r.json().catch(()=>({})); throw new Error(j.error||('HTTP '+r.status)); }
    document.getElementById('mcpName').value=''; document.getElementById('mcpUrl').value='';
    refreshMcp();
  }catch(e){ msg.textContent=e.message; }
}
async function removeMcp(name){
  try{ await fetch('/mcp-servers',{method:'DELETE',headers:{'content-type':'application/json'},
    body:JSON.stringify({name})}); refreshMcp(); }catch(e){}
}

// ---------- approvals ----------
let apBusy=false;
async function refreshApprovals(){
  if(apBusy)return; apBusy=true;
  try{
    const r=await fetch('/approvals'); if(!r.ok)return;
    const {pending=[]}=await r.json(); const box=document.getElementById('approvals');
    if(!pending.length){ box.hidden=true; box.innerHTML=''; return; }
    box.hidden=false;
    box.innerHTML='<div class="hdr">⚠ '+pending.length+' destructive action'+(pending.length>1?'s':'')+' awaiting your approval</div>'+
      pending.map(a=>`<div class="ap"><span class="txt mono">${esc(a.summary||a.tool)}</span>
        <span class="age">${a.age_s||0}s</span>
        <button class="primary" onclick="decide(${a.id},true)">Approve</button>
        <button onclick="decide(${a.id},false)" style="border-color:var(--bad);color:#ffb4ae">Deny</button></div>`).join('');
  }catch(e){}finally{apBusy=false;}
}
async function decide(id,approved){
  try{ await fetch('/approve',{method:'POST',headers:{'content-type':'application/json'},
    body:JSON.stringify({id,approved})}); }catch(e){} refreshApprovals();
}

// ---------- tabs ----------
function showTab(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.dataset.tab===t));
  document.querySelectorAll('.pane').forEach(e=>e.classList.toggle('active',e.id==='pane-'+t));
  if(t==='mcp') refreshMcp(); if(t==='apps') refreshApps();
}

// ---------- actions ----------
async function startTask(){
  const i=document.getElementById('taskInput'); const d=i.value.trim(); if(!d)return;
  try{ await callTool('slug_agent_start_task',{description:d}); i.value=''; }catch(e){ alert(e.message); }
  refreshStatus();
}
async function ctl(name){ try{ await callTool(name); }catch(e){} refreshStatus(); }

// ---------- loop ----------
function tick(){ return lastStatus==='running'?900:3000; }
async function loop(){
  if(!document.hidden){
    await refreshStatus(); refreshApprovals();
    refreshTree(false);
    if(Date.now()-appsAt>5000){ appsAt=Date.now(); if(document.getElementById('pane-apps').classList.contains('active')) refreshApps(); }
  }
  setTimeout(loop, tick());
}
function slowLoop(){ if(!document.hidden){ refreshInfo();
  if(document.getElementById('pane-mcp').classList.contains('active')) refreshMcp(); }
  setTimeout(slowLoop, 5000); }

refreshInfo(); refreshMcp(); refreshTree(true); loop(); slowLoop();
</script>
